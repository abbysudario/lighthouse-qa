name: Lighthouse CI
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      flake_mode:
        description: 'Enable flake detection mode (runs stability tests 5x)'
        required: false
        default: 'false'
jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
      SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
      FLAKE_MODE: ${{ github.event.inputs.flake_mode || 'false' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      AI_PROVIDER: mistral
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npm test

      - name: Generate quality signal report
        if: always()
        run: npm run analyze

      - name: Generate AI insights
        if: always()
        run: npm run ai-analyze

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload results and summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: reports/