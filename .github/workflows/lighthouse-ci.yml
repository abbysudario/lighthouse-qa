name: Lighthouse CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      flake_mode:
        description: 'Enable flake detection mode (runs stability tests 5x)'
        required: false
        default: 'false'
      signal_mode:
        description: 'Enable signal mode (includes deliberate signal fixtures for QA Signal Hub - will cause a failed CI run)'
        required: false
        default: 'false'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    env:
      SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
      SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
      FLAKE_MODE: ${{ github.event.inputs.flake_mode || 'false' }}
      SIGNAL_MODE: ${{ github.event.inputs.signal_mode || 'false' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      AI_PROVIDER: mistral

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npx playwright test

      - name: Generate quality signal report
        if: always()
        run: npm run analyze

      - name: Generate AI insights
        if: always()
        run: npm run ai-analyze

      - name: Generate Allure report
        if: always()
        run: npm run allure:generate

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-allure
          path: allure-report/

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages

      - name: Post dashboard URL to job summary
        if: always()
        run: |
          echo "## 🔦 Lighthouse Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Live Dashboard:** https://abbysudario.github.io/lighthouse-qa/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Signal Mode:** $SIGNAL_MODE" >> $GITHUB_STEP_SUMMARY

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-playwright
          path: playwright-report/

      - name: Upload results and summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-signals
          path: reports/

      - name: Notify QA Signal Hub
        if: always()
        run: |
          # ai-classification.json only exists when failures are present.
          # Empty array is the correct default on a clean run.
          CLASSIFICATIONS=$(jq -c '.classifications // []' reports/ai-classification.json 2>/dev/null || echo '[]')
          curl -X POST ${{ secrets.N8N_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d "{
              \"status\": \"${{ job.status }}\",
              \"signal_mode\": \"${{ github.event.inputs.signal_mode || 'false' }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"classifications\": $CLASSIFICATIONS
            }"